name: Amanz Bot

on:
  schedule:
    - cron: "*/20 * * * *"    # Setiap 20 minit
  workflow_dispatch:

jobs:
  run-amanz-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Amanz Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py

      - name: Commit last_link.txt if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add last_link.txt
          
          if git diff --staged --quiet; then
            echo "✅ Tiada perubahan pada last_link.txt"
          else
            echo "📝 Ada update pada last_link.txt, sedang commit & push..."
            
            # Retry logic untuk elak conflict
            for i in {1..3}; do
              echo "🔄 Percubaan push ke-$i..."
              
              git pull --rebase origin main || true
              
              git commit -m "chore: update last sent Amanz link" || true
              
              if git push --force-with-lease; then
                echo "✅ Berjaya push last_link.txt"
                exit 0
              else
                echo "⚠️ Push gagal, retrying dalam 3 saat..."
                sleep 3
              fi
            done
            
            echo "❌ Gagal push selepas 3 percubaan"
            exit 1
          fi
