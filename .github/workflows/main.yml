name: Amanz Bot

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  run-amanz-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ambil semua history supaya rebase senang

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Amanz Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py

      - name: Commit last_link.txt if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Simpan perubahan bot ke dalam staging
          git add last_link.txt
          
          # 2. Check kalau ada perubahan
          if git diff --staged --quiet; then
            echo "✅ Tiada perubahan pada last_link.txt"
          else
            # 3. Commit dulu lokal
            git commit -m "chore: update last sent Amanz link"
            
            # 4. Loop untuk tarik data terbaru dan push (Retry 5 kali)
            for i in {1..5}; do
              echo "Percubaan push ke-$i..."
              
              # Tarik data terbaru dari GitHub Web (phone kau tadi)
              git pull --rebase origin main
              
              # Cuba hantar (push)
              if git push origin main; then
                echo "✅ BERJAYA PUSH!"
                exit 0
              fi
              
              echo "❌ Gagal push, tunggu 5 saat sebelum cuba lagi..."
              sleep 5
            done
            
            echo "❌ Masih gagal selepas 5 kali cubaan."
            exit 1
          fi
